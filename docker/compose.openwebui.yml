services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    env_file:
      - .env

    ports:
      - "8080:8080"

    environment:
      OPENAI_API_BASE_URL: http://litellm:4000/v1
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      HF_TOKEN: ${HF_TOKEN}
      TZ: ${TZ}

    volumes:
      - /home/ramin/ai-platform/open-webui:/app/backend/data

    networks:
      - ai-platform

networks:
  ai-platform:
    external: true
