services:

  vllm-qwen3-8b:
    image: vllm/vllm-openai:latest
    container_name: vllm-qwen3-8b
    restart: unless-stopped

    gpus:
      - driver: nvidia
        device_ids: ["0"]
        capabilities: [gpu]

    environment:
      NVIDIA_VISIBLE_DEVICES: "0"
      NVIDIA_DRIVER_CAPABILITIES: compute,utility

    volumes:
      - /home/ramin/ai-platform/models/chat:/models

    command: >
      --model /models/Qwen3-8B
      --served-model-name Qwen3-8B
      --host 0.0.0.0
      --port 8000
      --tensor-parallel-size 1
      --gpu-memory-utilization 0.92

    expose:
      - "8000"

    healthcheck:
      test: ["CMD","curl","-f","http://localhost:8000/v1/models"]
      interval: 15s
      timeout: 5s
      retries: 60

    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

    networks:
      - ai-platform


  vllm-qwen2-5-7b-instruct:
    image: vllm/vllm-openai:latest
    container_name: vllm-qwen2-5-7b-instruct
    restart: unless-stopped

    gpus:
      - driver: nvidia
        device_ids: ["1"]
        capabilities: [gpu]

    environment:
      NVIDIA_VISIBLE_DEVICES: "1"
      NVIDIA_DRIVER_CAPABILITIES: compute,utility

    volumes:
      - /home/ramin/ai-platform/models/chat:/models

    command: >
      --model /models/Qwen2.5-7B-Instruct
      --served-model-name Qwen2.5-7B-Instruct
      --host 0.0.0.0
      --port 8000
      --tensor-parallel-size 1
      --gpu-memory-utilization 0.92

    expose:
      - "8000"

    healthcheck:
      test: ["CMD","curl","-f","http://localhost:8000/v1/models"]
      interval: 15s
      timeout: 5s
      retries: 60

    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

    networks:
      - ai-platform


networks:
  ai-platform:
    name: ai-platform
