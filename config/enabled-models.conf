# ==================================================================================
# enabled-models.conf
#
# format:
# type | model | state | priority | tp | gpu | vram_gb
#
# state:
#   on  = generate container
#   off = ignore
#
# priority:
#   lower number = higher priority
#
# tp:
#   tensor parallel size
#
# gpu:
#   auto
#   0
#   1
#   0,1
#
# vram_gb:
#   approximate required VRAM
# ==================================================================================

